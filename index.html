<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Aditya Deore — ML Engineer & Full-Stack Developer</title>
    <meta
      name="description"
      content="Portfolio of Aditya Deore — machine learning engineer and full-stack developer based in Pune, India."
    />
    <script>
      if ('scrollRestoration' in history) history.scrollRestoration = 'manual'
      ;(function () {
        window.scrollTo(0, 0)
        document.documentElement.scrollTop = 0
        document.body.scrollTop = 0
      })()
    </script>
    <script>
      ;(function () {
        var stored = localStorage.getItem('portfolio-theme')
        var theme =
          stored === 'light' || stored === 'dark'
            ? stored
            : window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
        var root = document.documentElement
        root.dataset.theme = theme
        root.style.colorScheme = theme
        root.classList.toggle('dark', theme === 'dark')
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
